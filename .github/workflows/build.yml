name: CI/CD📦

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 */2 * *"
  push:
    branches: ["main"]

jobs:
  build:
    if: github.actor == 'ammnt'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code📦
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install NodeJS🧱
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 20
          check-latest: true
          cache: "npm"

      - name: Get yarn cache directory🗑️
        id: yarn-cache-dir
        run: echo "dir=$(yarn cache dir)" >> $GITHUB_OUTPUT

      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
        id: yarn-cache
        with:
          path: ${{ steps.yarn-cache-dir.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install yarn and run hostlist-compiler⛓️
        run: |
          yarn audit --level high --no-cache || true
          yarn install --check-files
          yarn run build
        env:
          CI: true

      - name: Push the filter to repo✅
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          git config --global user.name "ammnt"
          git config --global user.email "happyzomb@ya.ru"
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | base64 --decode | gpg --import --batch --yes
          KEY_ID=$(gpg --list-secret-keys --keyid-format LONG | grep sec | awk '{print $2}' | cut -d'/' -f2)
          git config user.signingkey $KEY_ID
          git config commit.gpgsign true
          sed -i '/^!/d' filter.txt
          sort -Vu filter.txt -o filter.txt
          sed -i "1i! Last modified: $(date -u +'%Y-%m-%dT%H:%M:%S.%3NZ')\n" filter.txt
          git add filter.txt yarn.lock
          git commit -S -m "build: regular filter and dependencies update"
          git push
